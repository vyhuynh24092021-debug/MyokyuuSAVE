<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MerStor WIP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root{
      --bg:#ffffff;
      --panel:#f6f8fa;
      --panel-2:#eef2f6;
      --border:#d0d7de;
      --text:#1f2328;
      --muted:#656d76;
      --accent:#0969da;
      --accent-soft:#dbeafe;
      --hover:#eaf1fb;
      --badge-bg:#ddf4ff;
      --badge-text:#0550ae;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --header-h:56px;
      --sidebar-w:290px;
      --content-max:1200px;
    }

    [data-theme="dark"]{
      --bg:#0d1117;
      --panel:#161b22;
      --panel-2:#0f141b;
      --border:#30363d;
      --text:#e6edf3;
      --muted:#8b949e;
      --accent:#58a6ff;
      --accent-soft:#1c2d3e;
      --hover:#1c2433;
      --badge-bg:#1c2d3e;
      --badge-text:#58a6ff;
      --shadow:0 10px 30px rgba(0,0,0,.32);
    }

    html, body { height: 100%; }
    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      overscroll-behavior: none;
    }

    button, a { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }

    .app{
      height: 100vh;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    header{
      height: var(--header-h);
      flex: 0 0 var(--header-h);
      display:flex;
      align-items:center;
      gap: 12px;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      z-index: 40;
    }

    .icon-btn{
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      display:grid;
      place-items:center;
      cursor:pointer;
      flex: 0 0 auto;
      box-shadow: var(--shadow);
      color: var(--text);
      touch-action: manipulation;
      user-select: none;
    }

    .menu-lines{
      width: 16px;
      display: grid;
      gap: 3px;
    }
    .menu-lines span{
      height: 2px;
      border-radius: 999px;
      background: var(--text);
      display:block;
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }
    .brand-title{
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge{
      font-size: 11px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      white-space: nowrap;
    }

    .spacer{ flex:1; }

    .layout{
      flex: 1;
      min-height: 0;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .overlay{
      position: fixed;
      inset: var(--header-h) 0 0 0;
      background: rgba(0,0,0,.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 35;
    }
    .overlay.show{
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar{
      width: var(--sidebar-w);
      flex: 0 0 var(--sidebar-w);
      border-right: 1px solid var(--border);
      background: var(--panel);
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      transition: width .22s ease, flex-basis .22s ease, transform .22s ease;
      z-index: 36;
    }

    .sidebar-inner{
      padding-bottom: 12px;
    }

    .sidebar-section{
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .userbox{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }
    .avatar{
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      display:grid;
      place-items:center;
      color:#fff;
      font-weight: 900;
      flex: 0 0 auto;
    }
    .user-meta{
      min-width: 0;
    }
    .user-name{
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-handle{
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .side-actions{
      display:flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .pill{
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      cursor:pointer;
      touch-action: manipulation;
      user-select: none;
    }
    .pill:hover{
      background: var(--hover);
    }

    .nav-title{
      padding: 10px 14px 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-weight: 900;
    }

    .tree{
      display:flex;
      flex-direction: column;
      padding: 4px 0 10px;
      gap: 2px;
    }

    .tree-home{
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 10px 14px;
      cursor:pointer;
      user-select:none;
      font-size: 13px;
      color: var(--text);
      border-left: 3px solid transparent;
      touch-action: manipulation;
    }
    .tree-home:hover{ background: var(--hover); }
    .tree-home.active{
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      border-left-color: var(--accent);
    }

    .tree-node{
      --depth: 0;
      display:flex;
      flex-direction: column;
      min-width: 0;
    }

    .tree-row{
      display:flex;
      align-items:center;
      gap: 4px;
      min-width: 0;
      padding: 2px 10px 2px calc(14px + (var(--depth) * 14px));
    }

    .tree-expander{
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor:pointer;
      flex: 0 0 auto;
      border-radius: 6px;
    }
    .tree-expander:hover{
      background: var(--hover);
      color: var(--text);
    }

    .tree-select{
      flex: 1;
      min-width: 0;
      border: none;
      background: transparent;
      color: var(--text);
      cursor:pointer;
      text-align: left;
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      user-select:none;
      touch-action: manipulation;
    }
    .tree-select:hover{
      background: var(--hover);
    }

    .tree-select.active{
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }

    .tree-children{
      display:none;
    }
    .tree-node.open > .tree-children{
      display:block;
    }
    .tree-node.open > .tree-row .tree-expander{
      transform: rotate(90deg);
    }

    .children-inner{
      display:flex;
      flex-direction: column;
      gap: 2px;
    }

    .main{
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 18px;
    }

    .content-wrap{
      max-width: var(--content-max);
      margin: 0 auto;
      min-height: 100%;
      display:flex;
      flex-direction: column;
      gap: 16px;
    }

    .view{
      display:none;
      min-width: 0;
    }
    .view.show{ display:block; }

    .hero{
      padding: 16px;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .hero-top{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .hero-title{
      font-size: 20px;
      font-weight: 900;
      word-break: break-word;
    }

    .hero-sub{
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin: 2px 0 10px;
    }

    .section-head h2{
      font-size: 17px;
      font-weight: 900;
    }

    .count{
      font-size: 12px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 4px 9px;
      border-radius: 999px;
    }

    .crumbs{
      display:flex;
      align-items:center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 12px;
      user-select: none;
    }

    .crumb{
      border: none;
      background: transparent;
      color: var(--muted);
      cursor:pointer;
      padding: 2px 4px;
      border-radius: 6px;
    }
    .crumb:hover{
      background: var(--hover);
      color: var(--text);
    }
    .crumb.active{
      color: var(--text);
      font-weight: 800;
      cursor: default;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .card{
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      padding: 14px;
      box-shadow: var(--shadow);
      transition: transform .14s ease, border-color .14s ease;
      min-width: 0;
    }
    .card:hover{
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .card-name{
      font-size: 13px;
      font-weight: 800;
      word-break: break-word;
      line-height: 1.4;
    }

    .card-meta{
      margin-top: 6px;
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items:center;
      color: var(--muted);
      font-size: 12px;
    }

    .tag{
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 11px;
      font-weight: 800;
    }

    .card-foot{
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mini-btn{
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12px;
      cursor:pointer;
      text-decoration:none;
      white-space: nowrap;
      touch-action: manipulation;
      user-select: none;
    }
    .mini-btn:hover{
      background: var(--hover);
    }
    .mini-btn.primary{
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .preview-wrap{
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .preview-head{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .preview-name{
      font-size: 14px;
      font-weight: 900;
      word-break: break-word;
    }

    .preview-body{
      padding: 14px;
      min-height: 130px;
      max-height: min(72vh, 780px);
      overflow:auto;
      -webkit-overflow-scrolling: touch;
    }

    .preview-text{
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
    }

    .preview-md{
      font-size: 14px;
      line-height: 1.75;
    }
    .preview-md h1{ font-size: 24px; margin: 0 0 12px; }
    .preview-md h2{ font-size: 19px; margin: 18px 0 8px; }
    .preview-md h3{ font-size: 16px; margin: 14px 0 6px; }
    .preview-md p, .preview-md li{ color: var(--muted); }
    .preview-md a{ color: var(--accent); text-decoration:none; }
    .preview-md a:hover{ text-decoration: underline; }
    .preview-md pre{
      overflow:auto;
      padding: 12px;
      border-radius: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .preview-md code{
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 5px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92em;
    }
    .preview-md blockquote{
      border-left: 3px solid var(--border);
      margin: 0;
      padding-left: 12px;
      color: var(--muted);
    }
    .preview-md img{
      max-width: 100%;
      border-radius: 10px;
    }
    .preview-md table{
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 10px 0;
    }
    .preview-md th,
    .preview-md td{
      border: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
    }
    .preview-md th{
      background: var(--panel-2);
    }

    .state{
      padding: 18px 4px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .spinner{
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .7s linear infinite;
      display:inline-block;
      vertical-align: middle;
      margin-right: 8px;
      flex: 0 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden{ display:none !important; }

    .settings-modal{
      position: fixed;
      inset: 0;
      display:none;
      z-index: 60;
    }
    .settings-modal.open{ display:block; }

    .settings-backdrop{
      position:absolute;
      inset: 0;
      background: rgba(0,0,0,.42);
    }

    .settings-sheet{
      position:absolute;
      top: calc(var(--header-h) + 10px);
      right: 10px;
      width: min(360px, calc(100vw - 20px));
      max-height: calc(100vh - var(--header-h) - 20px);
      overflow:auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .settings-title{
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .settings-row{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .settings-row:last-child{
      border-bottom: none;
    }

    .settings-text{
      display:flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .settings-label{
      font-size: 13px;
      font-weight: 800;
    }
    .settings-desc{
      font-size: 12px;
      color: var(--muted);
    }

    .toggle{
      width: 38px;
      height: 20px;
      background: var(--border);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      flex: 0 0 auto;
      transition: background .2s ease;
    }
    .toggle::after{
      content:'';
      position:absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: left .2s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
    }
    .toggle.on{
      background: var(--accent);
    }
    .toggle.on::after{
      left: 20px;
    }

    @media (max-width: 980px){
      .sidebar{
        position: fixed;
        top: var(--header-h);
        left: 0;
        bottom: 0;
        transform: translateX(-102%);
        box-shadow: var(--shadow);
        width: min(var(--sidebar-w), 86vw);
        flex-basis: auto;
      }
      .sidebar.open{
        transform: translateX(0);
      }
      .main{
        padding: 14px;
      }
      .grid{
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px){
      .brand-title{
        font-size: 14px;
      }
      .hero-title{
        font-size: 18px;
      }
      .section-head h2{
        font-size: 16px;
      }
      .preview-body{
        max-height: none;
      }
      .settings-sheet{
        left: 10px;
        right: 10px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <button class="icon-btn" id="sidebarBtn" type="button" aria-label="Toggle sidebar">
        <div class="menu-lines"><span></span><span></span><span></span></div>
      </button>

      <div class="brand">
        <span class="brand-title" id="brandTitle">MerStor</span>
        <span class="badge">WIP</span>
      </div>

      <div class="spacer"></div>

      <button class="icon-btn" id="settingsBtn" type="button" aria-label="Open settings">⚙</button>
    </header>

    <div class="layout" id="layout">
      <div class="overlay" id="overlay"></div>

      <aside class="sidebar" id="sidebar">
        <div class="sidebar-inner">
          <div class="sidebar-section">
            <div class="userbox">
              <div class="avatar" id="avatarText">M</div>
              <div class="user-meta">
                <div class="user-name" id="userName">Loading...</div>
                <div class="user-handle" id="userHandle">...</div>
              </div>
            </div>
            <div class="side-actions">
              <button class="pill" id="homeBtn" type="button">Home</button>
              <button class="pill" id="refreshBtn" type="button">Refresh</button>
            </div>
          </div>

          <div class="nav-title">Explorer</div>
          <div class="tree" id="treeRoot">
            <div class="state" style="padding: 14px;">
              <span class="spinner"></span> Loading repository...
            </div>
          </div>
        </div>
      </aside>

      <main class="main" id="main">
        <div class="content-wrap">
          <section class="view show" id="homeView">
            <div class="hero">
              <div class="hero-top">
                <div class="hero-title" id="repoTitle">Loading...</div>
                <span class="badge" id="repoVisibility">Public</span>
              </div>
              <div class="hero-sub" id="repoMeta">
                Loading overview...
              </div>
            </div>

            <div class="preview-wrap" style="margin-top:16px;">
              <div class="preview-head">
                <div class="preview-name">Overview source</div>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                  <a class="mini-btn" id="openSourceBtn" href="#" target="_blank" rel="noreferrer">Open raw</a>
                </div>
              </div>
              <div class="preview-body" id="readmeBody">
                <div class="state"><span class="spinner"></span> Loading...</div>
              </div>
            </div>
          </section>

          <section class="view" id="folderView">
            <div class="section-head">
              <h2 id="folderTitle">Files</h2>
              <span class="count" id="folderCount">0 files</span>
            </div>

            <div class="crumbs" id="crumbs"></div>

            <div class="grid" id="fileGrid"></div>

            <div class="preview-wrap hidden" id="filePreviewWrap" style="margin-top:16px;">
              <div class="preview-head">
                <div class="preview-name" id="filePreviewName">File preview</div>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                  <a class="mini-btn primary" id="downloadBtn" href="#" target="_blank" rel="noreferrer">Download</a>
                  <button class="mini-btn" id="closePreviewBtn" type="button">Close preview</button>
                </div>
              </div>
              <div class="preview-body" id="filePreviewBody"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <div class="settings-modal" id="settingsModal" aria-hidden="true">
    <div class="settings-backdrop" id="settingsBackdrop"></div>
    <div class="settings-sheet" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="settings-title">Settings</div>

      <div class="settings-row">
        <div class="settings-text">
          <div class="settings-label">Dark mode</div>
          <div class="settings-desc">Switch theme instantly.</div>
        </div>
        <div class="toggle" id="themeToggle" role="switch" aria-checked="false" tabindex="0"></div>
      </div>

      <div class="settings-row">
        <div class="settings-text">
          <div class="settings-label">Repository</div>
          <div class="settings-desc" id="settingRepo">Loading...</div>
        </div>
      </div>

      <div class="settings-row">
        <div class="settings-text">
          <div class="settings-label">Visibility</div>
          <div class="settings-desc" id="settingVisibility">...</div>
        </div>
      </div>

      <div class="settings-row">
        <div class="settings-text">
          <div class="settings-label">Branch</div>
          <div class="settings-desc" id="settingBranch">main</div>
        </div>
      </div>

      <div class="settings-row">
        <button class="pill" id="closeSettingsBtn" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    const OWNER = 'vyhuynh24092021-debug';
    const REPO  = 'MyokyuuSAVE';
    const API   = `https://api.github.com/repos/${OWNER}/${REPO}`;

    const $ = (id) => document.getElementById(id);

    const state = {
      theme: localStorage.getItem('theme') || 'light',
      sidebarOpen: false,
      activeView: 'home',
      currentFolderPath: '',
      currentFolderLabel: '',
      currentFile: null,
      rootItems: [],
      repoInfo: null,
      dirCache: new Map(),
      fileCache: new Map(),
    };

    const isReadmeLike = (name = '') => /^readme(\.[a-z0-9]+)?$/i.test(String(name).trim());
    const isTextPreviewable = (name = '') => {
      const ext = fileExt(name);
      return [
        'txt','md','json','js','ts','jsx','tsx','html','htm','css','scss','less',
        'py','java','kt','kts','c','cpp','h','hpp','go','rs','rb','php','lua',
        'sh','bat','ps1','yml','yaml','xml','ini','cfg','conf','toml','csv',
        'sql','log','dart','swift','mjs','cjs','vue','svelte','gradle','properties',
        'diff','patch'
      ].includes(ext);
    };

    const isImagePreviewable = (name = '') => {
      const ext = fileExt(name);
      return ['png','jpg','jpeg','gif','webp','bmp','svg','avif'].includes(ext);
    };

    function fileExt(name = '') {
      const i = String(name).lastIndexOf('.');
      return i >= 0 ? String(name).slice(i + 1).toLowerCase() : '';
    }

    function sizeStr(n) {
      if (typeof n !== 'number') return '';
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1024 / 1024).toFixed(1)} MB`;
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function setTheme(theme) {
      state.theme = theme === 'dark' ? 'dark' : 'light';
      if (state.theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      else document.documentElement.removeAttribute('data-theme');

      localStorage.setItem('theme', state.theme);
      $('themeToggle').classList.toggle('on', state.theme === 'dark');
      $('themeToggle').setAttribute('aria-checked', state.theme === 'dark' ? 'true' : 'false');
    }

    function toggleTheme() {
      setTheme(state.theme === 'dark' ? 'light' : 'dark');
    }

    function openSettings() {
      $('settingsModal').classList.add('open');
      $('settingsModal').setAttribute('aria-hidden', 'false');
    }

    function closeSettings() {
      $('settingsModal').classList.remove('open');
      $('settingsModal').setAttribute('aria-hidden', 'true');
    }

    function openSidebar() {
      state.sidebarOpen = true;
      $('sidebar').classList.add('open');
      $('overlay').classList.add('show');
    }

    function closeSidebar() {
      state.sidebarOpen = false;
      $('sidebar').classList.remove('open');
      $('overlay').classList.remove('show');
    }

    function toggleSidebar() {
      state.sidebarOpen ? closeSidebar() : openSidebar();
    }

    function closeSidebarOnMobile() {
      if (window.innerWidth <= 980) closeSidebar();
    }

    async function fetchJson(url) {
      const res = await fetch(url, {
        headers: { Accept: 'application/vnd.github+json' }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function fetchContents(path = '') {
      const key = path || '__root__';
      if (state.dirCache.has(key)) return state.dirCache.get(key);

      const url = path ? `${API}/contents/${path}` : `${API}/contents`;
      const data = await fetchJson(url);

      const list = Array.isArray(data) ? data : [];
      const filtered = list
        .filter(item => item.type === 'dir' || item.type === 'file')
        .filter(item => !isReadmeLike(item.name))
        .sort((a, b) => {
          if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
          return a.name.localeCompare(b.name);
        });

      state.dirCache.set(key, filtered);
      return filtered;
    }

    function setActiveTreeHome() {
      document.querySelectorAll('.tree-home').forEach(el => el.classList.remove('active'));
      const home = $('homeTreeItem');
      if (home) home.classList.add('active');
      document.querySelectorAll('.tree-select').forEach(el => el.classList.remove('active'));
    }

    function setActiveTreePath(path) {
      document.querySelectorAll('.tree-home').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tree-select').forEach(el => {
        if (el.dataset.path === path) el.classList.add('active');
        else el.classList.remove('active');
      });
    }

    function showHome() {
      state.activeView = 'home';
      $('homeView').classList.add('show');
      $('folderView').classList.remove('show');
      setActiveTreeHome();
      closeSidebarOnMobile();
    }

    function showFolder() {
      state.activeView = 'folder';
      $('homeView').classList.remove('show');
      $('folderView').classList.add('show');
    }

    function buildBreadcrumb(path) {
      const parts = path ? path.split('/').filter(Boolean) : [];
      const crumbs = [];

      crumbs.push(`<button class="crumb ${parts.length === 0 ? 'active' : ''}" data-crumb="">Home</button>`);

      let acc = '';
      parts.forEach((part, index) => {
        acc = acc ? `${acc}/${part}` : part;
        const active = index === parts.length - 1;
        crumbs.push(`<span>›</span>`);
        crumbs.push(`<button class="crumb ${active ? 'active' : ''}" data-crumb="${escapeHtml(acc)}">${escapeHtml(part)}</button>`);
      });

      $('crumbs').innerHTML = crumbs.join('');
      $('crumbs').querySelectorAll('[data-crumb]').forEach(btn => {
        btn.addEventListener('click', () => {
          const path = btn.dataset.crumb || '';
          if (!path) {
            showHome();
            return;
          }
          loadFolderView(path, path.split('/').pop());
        });
      });
    }

    function renderFileGrid(items) {
      if (!items.length) {
        $('fileGrid').innerHTML = '<div class="state">No visible files here.</div>';
        return;
      }

      $('fileGrid').innerHTML = items.map(file => {
        const ext = fileExt(file.name) || 'file';
        return `
          <article class="card">
            <div class="card-name">${escapeHtml(file.name)}</div>
            <div class="card-meta">
              <span>${sizeStr(file.size)}</span>
              <span class="tag">.${escapeHtml(ext)}</span>
            </div>
            <div class="card-foot">
              <button class="mini-btn primary" type="button" data-preview="${escapeHtml(file.path)}" data-download="${escapeHtml(file.download_url)}" data-name="${escapeHtml(file.name)}">Preview</button>
              <a class="mini-btn" href="${escapeHtml(file.download_url)}" download="${escapeHtml(file.name)}" target="_blank" rel="noreferrer">Download</a>
            </div>
          </article>
        `;
      }).join('');

      $('fileGrid').querySelectorAll('[data-preview]').forEach(btn => {
        btn.addEventListener('click', () => {
          openFilePreview({
            path: btn.dataset.preview,
            download_url: btn.dataset.download,
            name: btn.dataset.name
          });
        });
      });
    }

    async function loadFolderView(path = '', label = 'Files') {
      showFolder();
      state.currentFolderPath = path;
      state.currentFolderLabel = label;
      state.currentFile = null;

      $('folderTitle').textContent = label || 'Files';
      $('folderCount').textContent = 'Loading...';
      $('fileGrid').innerHTML = '<div class="state"><span class="spinner"></span> Loading files...</div>';
      $('filePreviewWrap').classList.add('hidden');
      $('filePreviewBody').innerHTML = '';

      setActiveTreePath(path);
      buildBreadcrumb(path);

      try {
        const items = await fetchContents(path);
        const files = items.filter(item => item.type === 'file');

        $('folderCount').textContent = `${files.length} file${files.length === 1 ? '' : 's'}`;
        renderFileGrid(files);
      } catch {
        $('folderCount').textContent = '0 files';
        $('fileGrid').innerHTML = '<div class="state">Could not load files.</div>';
      }

      closeSidebarOnMobile();
    }

    async function openFilePreview(file) {
      state.currentFile = file;
      $('filePreviewWrap').classList.remove('hidden');
      $('filePreviewName').textContent = file.path;
      $('downloadBtn').href = file.download_url;
      $('filePreviewBody').innerHTML = '<div class="state"><span class="spinner"></span> Loading preview...</div>';

      try {
        if (isImagePreviewable(file.name)) {
          $('filePreviewBody').innerHTML = `<img src="${escapeHtml(file.download_url)}" alt="${escapeHtml(file.name)}" style="max-width:100%;border-radius:12px;display:block;">`;
          $('filePreviewWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
          return;
        }

        if (!isTextPreviewable(file.name) || file.size > 1024 * 1024 * 2) {
          $('filePreviewBody').innerHTML = `
            <div class="state">
              File preview is unavailable for this type or file size.
              <br><br>
              Use Download to open it directly.
            </div>
          `;
          $('filePreviewWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
          return;
        }

        const res = await fetch(file.download_url);
        const text = await res.text();

        if (fileExt(file.name) === 'md') {
          $('filePreviewBody').innerHTML = `<div class="preview-md">${marked.parse(text)}</div>`;
        } else {
          $('filePreviewBody').innerHTML = `<pre class="preview-text"></pre>`;
          $('filePreviewBody .preview-text').textContent = text;
        }

        $('filePreviewWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch {
        $('filePreviewBody').innerHTML = '<div class="state">Could not load preview.</div>';
      }
    }

    function closeFilePreview() {
      $('filePreviewWrap').classList.add('hidden');
      $('filePreviewBody').innerHTML = '';
      state.currentFile = null;
    }

    async function loadHome() {
      showHome();

      try {
        const [repoInfo, readmeRes] = await Promise.all([
          fetchJson(API),
          fetch(`${API}/readme`, { headers: { Accept: 'application/vnd.github.raw' } })
        ]);

        state.repoInfo = repoInfo;

        $('brandTitle').textContent = repoInfo.name || REPO;
        $('repoTitle').textContent = repoInfo.name || REPO;
        $('repoVisibility').textContent = repoInfo.private ? 'Private' : 'Public';
        $('settingVisibility').textContent = repoInfo.private ? 'Private' : 'Public';
        $('settingRepo').textContent = `${repoInfo.full_name || `${OWNER}/${REPO}`}`;
        $('settingBranch').textContent = repoInfo.default_branch || 'main';
        $('userName').textContent = repoInfo.name || REPO;
        $('userHandle').textContent = `@${OWNER}`;
        $('avatarText').textContent = (repoInfo.name || REPO).charAt(0).toUpperCase();

        const desc = repoInfo.description || 'Overview from repository source.';
        $('repoMeta').textContent = desc;

        const readmeText = await readmeRes.text();
        $('readmeBody').innerHTML = marked.parse(readmeText);
        $('openSourceBtn').href = `${API}/readme`;
      } catch {
        $('repoTitle').textContent = REPO;
        $('repoMeta').textContent = 'Could not load overview source.';
        $('readmeBody').innerHTML = '<div class="state">Could not load overview.</div>';
        $('settingRepo').textContent = `${OWNER}/${REPO}`;
        $('settingVisibility').textContent = 'Unknown';
        $('openSourceBtn').href = '#';
      }
    }

    function createTreeItem(item, depth = 0) {
      if (item.type === 'file') {
        return `
          <div class="tree-node" style="--depth:${depth}">
            <div class="tree-row">
              <button class="tree-select file-select" type="button"
                data-action="file"
                data-path="${escapeHtml(item.path)}"
                data-download="${escapeHtml(item.download_url)}"
                data-name="${escapeHtml(item.name)}">
                📄 <span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(item.name)}</span>
              </button>
            </div>
          </div>
        `;
      }

      const hasChildren = true;
      return `
        <div class="tree-node dir" data-path="${escapeHtml(item.path)}" data-loaded="0" data-depth="${depth}" style="--depth:${depth}">
          <div class="tree-row">
            <button class="tree-expander" type="button" data-action="toggle" aria-label="Toggle folder" ${hasChildren ? '' : 'disabled'}>▶</button>
            <button class="tree-select dir-select" type="button" data-action="open-dir" data-path="${escapeHtml(item.path)}" data-name="${escapeHtml(item.name)}">
              📁 <span style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(item.name)}</span>
            </button>
          </div>
          <div class="tree-children">
            <div class="children-inner"></div>
          </div>
        </div>
      `;
    }

    async function loadTreeChildren(dirNode) {
      const path = dirNode.dataset.path || '';
      const loaded = dirNode.dataset.loaded === '1';
      if (loaded) return;

      const inner = dirNode.querySelector('.children-inner');
      inner.innerHTML = '<div class="state" style="padding:8px 14px;"><span class="spinner"></span> Loading...</div>';

      try {
        const items = await fetchContents(path);
        const html = items.map(item => createTreeItem(item, Number(dirNode.dataset.depth || 0) + 1)).join('');
        inner.innerHTML = html || '<div class="state" style="padding:8px 14px;">Empty</div>';
        dirNode.dataset.loaded = '1';

        inner.querySelectorAll('.dir-select').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const p = btn.dataset.path;
            const n = btn.dataset.name;
            loadFolderView(p, n);
          });
        });

        inner.querySelectorAll('.tree-expander').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const node = btn.closest('.tree-node.dir');
            node.classList.toggle('open');
            if (node.classList.contains('open')) await loadTreeChildren(node);
          });
        });

        inner.querySelectorAll('.file-select').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            openFilePreview({
              path: btn.dataset.path,
              download_url: btn.dataset.download,
              name: btn.dataset.name
            });
            closeSidebarOnMobile();
          });
        });
      } catch {
        inner.innerHTML = '<div class="state" style="padding:8px 14px;">Could not load folder.</div>';
      }
    }

    async function buildSidebar() {
      try {
        const root = await fetchContents('');
        state.rootItems = root;

        const rootFiles = root.filter(item => item.type === 'file');
        const rootDirs = root.filter(item => item.type === 'dir');

        let html = `
          <div class="tree-home active" id="homeTreeItem" role="button" tabindex="0">🏠 Home</div>
        `;

        if (rootDirs.length || rootFiles.length) {
          html += `<div class="nav-title">Root</div>`;
          html += `<div class="tree" id="rootTree">`;

          rootDirs.forEach(dir => {
            html += createTreeItem(dir, 0);
          });

          rootFiles.forEach(file => {
            html += createTreeItem(file, 0);
          });

          html += `</div>`;
        } else {
          html += `<div class="state" style="padding:14px;">No visible items.</div>`;
        }

        $('treeRoot').innerHTML = html;

        $('homeTreeItem').addEventListener('click', () => {
          setActiveTreeHome();
          loadHome();
        });

        $('homeTreeItem').addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            setActiveTreeHome();
            loadHome();
          }
        });

        document.querySelectorAll('#treeRoot .dir-select').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const p = btn.dataset.path;
            const n = btn.dataset.name;
            loadFolderView(p, n);
          });
        });

        document.querySelectorAll('#treeRoot .file-select').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            openFilePreview({
              path: btn.dataset.path,
              download_url: btn.dataset.download,
              name: btn.dataset.name
            });
            closeSidebarOnMobile();
          });
        });

        document.querySelectorAll('#treeRoot .tree-expander').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const node = btn.closest('.tree-node.dir');
            node.classList.toggle('open');
            if (node.classList.contains('open')) await loadTreeChildren(node);
          });
        });
      } catch {
        $('treeRoot').innerHTML = '<div class="state" style="padding:14px;">Could not load repository.</div>';
      }
    }

    function bindGlobalUI() {
      $('sidebarBtn').addEventListener('click', toggleSidebar);
      $('overlay').addEventListener('click', closeSidebar);
      $('settingsBtn').addEventListener('click', openSettings);
      $('settingsBackdrop').addEventListener('click', closeSettings);
      $('closeSettingsBtn').addEventListener('click', closeSettings);
      $('themeToggle').addEventListener('click', toggleTheme);
      $('themeToggle').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggleTheme();
        }
      });
      $('homeBtn').addEventListener('click', () => {
        setActiveTreeHome();
        loadHome();
      });
      $('refreshBtn').addEventListener('click', async () => {
        state.dirCache.clear();
        state.fileCache.clear();
        location.reload();
      });
      $('closePreviewBtn').addEventListener('click', closeFilePreview);

      window.addEventListener('resize', () => {
        if (window.innerWidth > 980) closeSidebar();
      });
    }

    async function init() {
      bindGlobalUI();
      setTheme(state.theme);
      $('brandTitle').textContent = REPO;
      $('repoTitle').textContent = REPO;
      $('userName').textContent = REPO;
      $('userHandle').textContent = `@${OWNER}`;
      $('avatarText').textContent = REPO.charAt(0).toUpperCase();
      $('settingRepo').textContent = `${OWNER}/${REPO}`;
      $('settingBranch').textContent = 'main';
      $('settingVisibility').textContent = 'Loading...';

      await Promise.all([
        buildSidebar(),
        loadHome()
      ]);

      try {
        const repoInfo = await fetchJson(API);
        $('repoVisibility').textContent = repoInfo.private ? 'Private' : 'Public';
        $('settingVisibility').textContent = repoInfo.private ? 'Private' : 'Public';
        $('settingRepo').textContent = repoInfo.full_name || `${OWNER}/${REPO}`;
        $('settingBranch').textContent = repoInfo.default_branch || 'main';
        $('repoMeta').textContent = repoInfo.description || 'Overview from repository source.';
      } catch {
        $('settingVisibility').textContent = 'Unknown';
      }
    }

    init();
  </script>
</body>
  </html>
