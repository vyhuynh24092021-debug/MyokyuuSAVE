<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MerStor WIP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root{
      --bg:#ffffff;
      --panel:#f6f8fa;
      --panel-2:#eef2f6;
      --border:#d0d7de;
      --text:#1f2328;
      --muted:#656d76;
      --accent:#0969da;
      --accent-2:#dbeafe;
      --hover:#eaf1fb;
      --badge-bg:#ddf4ff;
      --badge-text:#0550ae;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --header-h:56px;
      --sidebar-w:280px;
    }
    [data-theme="dark"]{
      --bg:#0d1117;
      --panel:#161b22;
      --panel-2:#0f141b;
      --border:#30363d;
      --text:#e6edf3;
      --muted:#8b949e;
      --accent:#58a6ff;
      --accent-2:#1c2d3e;
      --hover:#1c2433;
      --badge-bg:#1c2d3e;
      --badge-text:#58a6ff;
      --shadow:0 10px 30px rgba(0,0,0,.32);
    }

    html, body { height: 100%; }
    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      overscroll-behavior: none;
    }

    .app{
      height: 100vh;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    header{
      height: var(--header-h);
      flex: 0 0 var(--header-h);
      display:flex;
      align-items:center;
      gap: 12px;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      z-index: 20;
    }

    .menu-btn{
      width: 38px; height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      display:grid;
      place-items:center;
      cursor:pointer;
      flex: 0 0 auto;
      box-shadow: var(--shadow);
      touch-action: manipulation;
    }
    .menu-lines{
      width: 16px;
      display: grid;
      gap: 3px;
    }
    .menu-lines span{
      height: 2px;
      border-radius: 999px;
      background: var(--text);
      display:block;
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }
    .brand-title{
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge{
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      white-space: nowrap;
    }

    .spacer{ flex:1; }

    .icon-btn{
      width: 38px; height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor:pointer;
      display:grid;
      place-items:center;
      box-shadow: var(--shadow);
      touch-action: manipulation;
      color: var(--text);
      font-size: 16px;
    }

    .layout{
      flex: 1;
      min-height: 0;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .overlay{
      position: fixed;
      inset: var(--header-h) 0 0 0;
      background: rgba(0,0,0,.35);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      z-index: 25;
    }
    .overlay.show{
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar{
      width: var(--sidebar-w);
      flex: 0 0 var(--sidebar-w);
      border-right: 1px solid var(--border);
      background: var(--panel);
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      transition: transform .22s ease, width .22s ease, flex-basis .22s ease;
      z-index: 30;
    }

    .sidebar-inner{
      padding: 10px 0 14px;
    }

    .sidebar-section{
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .userbox{
      display:flex;
      align-items:center;
      gap: 10px;
    }
    .avatar{
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      display:grid;
      place-items:center;
      color:#fff;
      font-weight: 800;
      flex: 0 0 auto;
    }
    .user-meta{
      min-width: 0;
    }
    .user-name{
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-handle{
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .side-actions{
      display:flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .pill{
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      cursor:pointer;
      touch-action: manipulation;
    }

    .nav-title{
      padding: 10px 14px 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-weight: 800;
    }

    .nav-item{
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 10px 14px;
      cursor:pointer;
      user-select:none;
      font-size: 13px;
      line-height: 1.2;
      color: var(--text);
      touch-action: manipulation;
    }
    .nav-item:hover{ background: var(--hover); }
    .nav-item.active{
      background: var(--accent-2);
      color: var(--accent);
      font-weight: 700;
    }
    .nav-sub{
      padding-left: 22px;
      font-size: 12px;
      color: var(--muted);
    }

    .cat{
      margin-top: 6px;
      border-top: 1px solid var(--border);
    }
    .cat-head{
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 10px 14px;
      cursor:pointer;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      user-select:none;
    }
    .cat-head:hover{ color: var(--text); background: var(--hover); }
    .chev{
      margin-left:auto;
      transition: transform .18s ease;
      font-size: 10px;
    }
    .cat.open .chev{ transform: rotate(90deg); }
    .cat-body{ display:none; }
    .cat.open .cat-body{ display:block; }

    .main{
      flex: 1;
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 18px;
    }

    .page{
      max-width: 1100px;
      margin: 0 auto;
      display: none;
    }
    .page.show{ display:block; }

    .hero{
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .hero-top{
      display:flex;
      align-items:center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .hero-title{
      font-size: 20px;
      font-weight: 800;
    }
    .hero-sub{
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      margin: 12px 0 10px;
      flex-wrap: wrap;
    }
    .section-head h2{
      font-size: 17px;
      font-weight: 800;
    }
    .count{
      font-size: 12px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 4px 9px;
      border-radius: 999px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .card{
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
      transition: transform .14s ease, border-color .14s ease;
      min-width: 0;
    }
    .card:hover{
      transform: translateY(-1px);
      border-color: var(--accent);
    }
    .card-name{
      font-size: 13px;
      font-weight: 700;
      word-break: break-word;
      line-height: 1.35;
    }
    .card-meta{
      margin-top: 6px;
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items:center;
      color: var(--muted);
      font-size: 12px;
    }
    .tag{
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 11px;
      font-weight: 700;
    }
    .card-foot{
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }
    .mini-btn{
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12px;
      cursor:pointer;
      text-decoration:none;
      white-space: nowrap;
      touch-action: manipulation;
    }
    .mini-btn.primary{
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-2);
    }

    .preview-wrap{
      margin-top: 16px;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .preview-head{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .preview-name{
      font-size: 14px;
      font-weight: 800;
      word-break: break-word;
    }
    .preview-body{
      padding: 14px;
      min-height: 120px;
      overflow:auto;
      max-height: min(70vh, 760px);
      -webkit-overflow-scrolling: touch;
    }
    .preview-text{
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
    }
    .preview-md{
      font-size: 14px;
      line-height: 1.75;
    }
    .preview-md h1{ font-size: 24px; margin: 0 0 12px; }
    .preview-md h2{ font-size: 19px; margin: 18px 0 8px; }
    .preview-md h3{ font-size: 16px; margin: 14px 0 6px; }
    .preview-md p, .preview-md li{ color: var(--muted); }
    .preview-md a{ color: var(--accent); text-decoration:none; }
    .preview-md a:hover{ text-decoration: underline; }
    .preview-md pre{
      overflow:auto;
      padding: 12px;
      border-radius: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .preview-md code{
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 5px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92em;
    }
    .preview-md blockquote{
      border-left: 3px solid var(--border);
      margin: 0;
      padding-left: 12px;
      color: var(--muted);
    }

    .state{
      padding: 18px 4px;
      color: var(--muted);
      font-size: 14px;
    }
    .spinner{
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .7s linear infinite;
      display:inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden{ display:none !important; }

    @media (max-width: 900px){
      .sidebar{
        position: fixed;
        top: var(--header-h);
        left: 0;
        bottom: 0;
        transform: translateX(-102%);
        width: min(var(--sidebar-w), 86vw);
        flex-basis: auto;
        box-shadow: var(--shadow);
      }
      .sidebar.open{
        transform: translateX(0);
      }
      .main{
        padding: 14px;
      }
    }

    @media (min-width: 901px){
      .menu-btn.mobile-only{ display:none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <button class="menu-btn" id="menuBtn" aria-label="Open menu" type="button">
        <div class="menu-lines"><span></span><span></span><span></span></div>
      </button>

      <div class="brand">
        <span class="brand-title" id="repoTitle">MerStor</span>
        <span class="badge">WIP</span>
      </div>

      <div class="spacer"></div>

      <button class="icon-btn" id="themeBtn" title="Toggle theme" type="button">☾</button>
    </header>

    <div class="layout">
      <div class="overlay" id="overlay"></div>

      <aside class="sidebar" id="sidebar">
        <div class="sidebar-inner">
          <div class="sidebar-section">
            <div class="userbox">
              <div class="avatar" id="avatarText">M</div>
              <div class="user-meta">
                <div class="user-name" id="userName">Loading...</div>
                <div class="user-handle" id="userHandle">...</div>
              </div>
            </div>
            <div class="side-actions">
              <button class="pill" id="overviewBtn" type="button">Overview</button>
              <button class="pill" id="refreshBtn" type="button">Refresh</button>
            </div>
          </div>

          <div id="sidebarContent">
            <div class="state" style="padding:14px;">
              <span class="spinner"></span> Loading repository...
            </div>
          </div>
        </div>
      </aside>

      <main class="main" id="main">
        <div class="page show" id="overviewPage">
          <div class="hero">
            <div class="hero-top">
              <div class="hero-title" id="overviewTitle">Overview</div>
              <span class="badge" id="repoVisibility">Public</span>
            </div>
            <div class="hero-sub" id="overviewMeta">
              Loading README...
            </div>
          </div>

          <div class="preview-wrap">
            <div class="preview-head">
              <div class="preview-name">README preview</div>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <a class="mini-btn" id="openReadmeRaw" href="#" target="_blank" rel="noreferrer">Open raw</a>
              </div>
            </div>
            <div class="preview-body" id="readmeBody">
              <div class="state"><span class="spinner"></span> Loading...</div>
            </div>
          </div>
        </div>

        <div class="page" id="folderPage">
          <div class="section-head">
            <h2 id="folderTitle">Files</h2>
            <span class="count" id="folderCount">0 files</span>
          </div>

          <div class="grid" id="fileGrid"></div>

          <div class="preview-wrap hidden" id="filePreviewWrap">
            <div class="preview-head">
              <div class="preview-name" id="filePreviewName">File preview</div>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <a class="mini-btn primary" id="downloadBtn" href="#" target="_blank" rel="noreferrer">Download</a>
                <button class="mini-btn" id="closePreviewBtn" type="button">Close preview</button>
              </div>
            </div>
            <div class="preview-body" id="filePreviewBody"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const OWNER = "vyhuynh24092021-debug";
    const REPO = "MyokyuuSAVE";
    const API = `https://api.github.com/repos/${OWNER}/${REPO}`;

    const $ = (id) => document.getElementById(id);

    const state = {
      sidebarOpen: false,
      theme: localStorage.getItem("theme") || "",
      tree: [],
      currentFolder: "",
      currentFolderLabel: "",
      currentFile: null,
      repoRoot: [],
    };

    const isReadmeLike = (name = "") => /^readme(\.[^./]+)?$/i.test(name.trim());
    const fileExt = (name = "") => {
      const i = name.lastIndexOf(".");
      return i >= 0 ? name.slice(i + 1).toLowerCase() : "";
    };

    const sizeStr = (n) => {
      if (typeof n !== "number") return "";
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1024 / 1024).toFixed(1)} MB`;
    };

    const isPreviewableText = (name = "") => {
      const ext = fileExt(name);
      return [
        "txt","md","json","js","ts","jsx","tsx","html","htm","css","scss","less",
        "py","java","kt","kts","c","cpp","h","hpp","go","rs","rb","php","lua",
        "sh","bat","ps1","yml","yaml","xml","ini","cfg","conf","toml","csv",
        "sql","log","dart","swift","mjs","cjs","vue","svelte","gradle","properties"
      ].includes(ext);
    };

    function setTheme(next) {
      if (next === "dark") document.documentElement.setAttribute("data-theme", "dark");
      else document.documentElement.removeAttribute("data-theme");
      localStorage.setItem("theme", next);
      $("themeBtn").textContent = next === "dark" ? "☀" : "☾";
    }

    function toggleTheme() {
      setTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
    }

    function openSidebar() {
      state.sidebarOpen = true;
      $("sidebar").classList.add("open");
      $("overlay").classList.add("show");
      $("menuBtn").setAttribute("aria-label", "Close menu");
    }

    function closeSidebar() {
      state.sidebarOpen = false;
      $("sidebar").classList.remove("open");
      $("overlay").classList.remove("show");
      $("menuBtn").setAttribute("aria-label", "Open menu");
    }

    function toggleSidebar() {
      state.sidebarOpen ? closeSidebar() : openSidebar();
    }

    function showOverview() {
      $("overviewPage").classList.add("show");
      $("folderPage").classList.remove("show");
      clearActiveNav();
      const home = $("nav-home");
      if (home) home.classList.add("active");
      closeSidebarOnMobile();
    }

    function showFolderView() {
      $("overviewPage").classList.remove("show");
      $("folderPage").classList.add("show");
      clearActiveNav();
    }

    function clearActiveNav() {
      document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
    }

    function closeSidebarOnMobile() {
      if (window.innerWidth <= 900) closeSidebar();
    }

    async function fetchJson(url) {
      const res = await fetch(url, { headers: { Accept: "application/vnd.github+json" } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function loadOverview() {
      showOverview();
      $("overviewMeta").textContent = "Loading README...";
      $("readmeBody").innerHTML = '<div class="state"><span class="spinner"></span> Loading...</div>';
      $("openReadmeRaw").href = "#";

      try {
        const readmeRes = await fetch(`${API}/readme`, {
          headers: { Accept: "application/vnd.github.raw" }
        });
        const readmeText = await readmeRes.text();
        $("readmeBody").innerHTML = marked.parse(readmeText);
        $("overviewMeta").textContent = "README loaded from repository root.";
        $("openReadmeRaw").href = `${API}/readme`;
      } catch {
        $("readmeBody").innerHTML = '<div class="state">Could not load README.</div>';
        $("overviewMeta").textContent = "No README available.";
      }
    }

    async function loadFolder(path = "", label = "Files") {
      showFolderView();
      state.currentFolder = path;
      state.currentFolderLabel = label;
      state.currentFile = null;

      $("folderTitle").textContent = label;
      $("folderCount").textContent = "Loading...";
      $("fileGrid").innerHTML = '<div class="state"><span class="spinner"></span> Loading files...</div>';
      $("filePreviewWrap").classList.add("hidden");
      $("filePreviewBody").innerHTML = "";

      try {
        const items = await fetchJson(`${API}/contents/${path}`);
        const filtered = items
          .filter(item => item.type === "file")
          .filter(item => !isReadmeLike(item.name));

        $("folderCount").textContent = `${filtered.length} file${filtered.length === 1 ? "" : "s"}`;

        if (!filtered.length) {
          $("fileGrid").innerHTML = '<div class="state">No visible files here.</div>';
          return;
        }

        $("fileGrid").innerHTML = filtered.map(file => `
          <article class="card">
            <div class="card-name">${escapeHtml(file.name)}</div>
            <div class="card-meta">
              <span>${sizeStr(file.size)}</span>
              <span class="tag">.${escapeHtml(fileExt(file.name) || "file")}</span>
            </div>
            <div class="card-foot">
              <button class="mini-btn primary" type="button" data-preview="${encodeURIComponent(file.path)}">Preview</button>
              <a class="mini-btn" href="${file.download_url}" target="_blank" rel="noreferrer" download="${escapeAttr(file.name)}">Download</a>
            </div>
          </article>
        `).join("");

        document.querySelectorAll("[data-preview]").forEach(btn => {
          btn.addEventListener("click", () => {
            const filePath = decodeURIComponent(btn.getAttribute("data-preview"));
            const file = filtered.find(x => x.path === filePath);
            if (file) openFilePreview(file);
          });
        });

      } catch {
        $("fileGrid").innerHTML = '<div class="state">Could not load files.</div>';
        $("folderCount").textContent = "0 files";
      }

      closeSidebarOnMobile();
    }

    async function openFilePreview(file) {
      state.currentFile = file;
      $("filePreviewWrap").classList.remove("hidden");
      $("filePreviewName").textContent = file.path;
      $("downloadBtn").href = file.download_url;
      $("filePreviewBody").innerHTML = '<div class="state"><span class="spinner"></span> Loading preview...</div>';

      if (!isPreviewableText(file.name) || file.size > 1024 * 1024) {
        $("filePreviewBody").innerHTML =
          `<div class="state">
            File preview is unavailable for this type or file size.
            <br><br>
            Use Download to open it directly.
          </div>`;
        return;
      }

      try {
        const res = await fetch(file.download_url);
        const text = await res.text();

        if (file.name.toLowerCase().endsWith(".md")) {
          $("filePreviewBody").innerHTML = `<div class="preview-md">${marked.parse(text)}</div>`;
        } else {
          $("filePreviewBody").innerHTML = `<pre class="preview-text"></pre>`;
          $("filePreviewBody .preview-text").textContent = text;
        }

        $("filePreviewWrap").scrollIntoView({ behavior: "smooth", block: "start" });
      } catch {
        $("filePreviewBody").innerHTML = '<div class="state">Could not load preview.</div>';
      }
    }

    function closeFilePreview() {
      $("filePreviewWrap").classList.add("hidden");
      $("filePreviewBody").innerHTML = "";
      state.currentFile = null;
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function escapeAttr(s) {
      return String(s).replaceAll('"', "&quot;");
    }

    function renderSidebar(rootItems) {
      const sidebar = $("sidebarContent");

      const dirs = rootItems.filter(x => x.type === "dir" && x.name !== ".github");

      let html = `
        <div class="nav-title">Home</div>
        <div class="nav-item active" id="nav-home">📄 Overview</div>
        <div class="nav-title">Scripts</div>
      `;

      if (!dirs.length) {
        html += `<div class="state" style="padding:14px;">No folders found.</div>`;
        sidebar.innerHTML = html;
        $("nav-home").addEventListener("click", () => loadOverview());
        return;
      }

      dirs.forEach((dir, idx) => {
        const catId = `cat-${idx}`;
        const bodyId = `body-${idx}`;
        html += `
          <div class="cat" id="${catId}">
            <div class="cat-head" data-toggle="${idx}">
              ${escapeHtml(dir.name)}
              <span class="chev">▶</span>
            </div>
            <div class="cat-body" id="${bodyId}">
              <div class="state" style="padding:10px 14px;">Loading...</div>
            </div>
          </div>
        `;
      });

      sidebar.innerHTML = html;

      const navHome = $("nav-home");
      navHome.addEventListener("click", () => loadOverview());

      dirs.forEach(async (dir, idx) => {
        const cat = $(`cat-${idx}`);
        const body = $(`body-${idx}`);
        const head = cat.querySelector(".cat-head");
        head.addEventListener("click", async () => {
          cat.classList.toggle("open");

          if (cat.dataset.loaded === "1") return;
          cat.dataset.loaded = "1";

          try {
            const items = await fetchJson(`${API}/contents/${dir.path}`);
            const visibleDirs = items.filter(x => x.type === "dir");
            const visibleFiles = items.filter(x => x.type === "file" && !isReadmeLike(x.name));

            let inner = "";

            if (visibleDirs.length) {
              visibleDirs.forEach(sub => {
                inner += `<div class="nav-item nav-sub" data-folder="${escapeAttr(sub.path)}">📁 ${escapeHtml(sub.name)}</div>`;
              });
            }

            if (visibleFiles.length && !visibleDirs.length) {
              inner += `<div class="nav-item nav-sub" data-folder="${escapeAttr(dir.path)}">📁 ${escapeHtml(dir.name)}</div>`;
            }

            if (!visibleDirs.length && !visibleFiles.length) {
              inner = `<div class="state" style="padding:10px 14px;">Empty</div>`;
            }

            body.innerHTML = inner;

            body.querySelectorAll("[data-folder]").forEach(el => {
              el.addEventListener("click", () => {
                const p = el.getAttribute("data-folder");
                const label = el.textContent.replace(/^📁\s*/, "").trim();
                loadFolder(p, label);
              });
            });
          } catch {
            body.innerHTML = `<div class="state" style="padding:10px 14px;">Could not load folder.</div>`;
          }
        });
      });
    }

    async function init() {
      if (state.theme === "dark") setTheme("dark");
      else setTheme("light");

      $("menuBtn").addEventListener("click", toggleSidebar);
      $("overlay").addEventListener("click", closeSidebar);
      $("themeBtn").addEventListener("click", toggleTheme);
      $("overviewBtn").addEventListener("click", loadOverview);
      $("refreshBtn").addEventListener("click", () => location.reload());
      $("closePreviewBtn").addEventListener("click", closeFilePreview);

      $("userName").textContent = REPO;
      $("userHandle").textContent = `@${OWNER}`;
      $("repoTitle").textContent = REPO;
      $("avatarText").textContent = (REPO[0] || "M").toUpperCase();

      try {
        const repoInfo = await fetchJson(API);
        $("repoVisibility").textContent = repoInfo.private ? "Private" : "Public";
      } catch {
        $("repoVisibility").textContent = "Repo";
      }

      try {
        const root = await fetchJson(`${API}/contents`);
        state.repoRoot = root;
        renderSidebar(root);
        await loadOverview();
      } catch {
        $("sidebarContent").innerHTML = `<div class="state" style="padding:14px;">Could not load repository.</div>`;
        $("readmeBody").innerHTML = `<div class="state">Could not load README.</div>`;
      }

      window.addEventListener("resize", () => {
        if (window.innerWidth > 900) closeSidebar();
      });
    }

    init();
  </script>
</body>
  </html>
