<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MerStor WIP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --sidebar-bg: #f6f8fa;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --hover: #eaf1fb;
      --active-bg: #dbeafe;
      --active-text: #0969da;
      --tag-bg: #ddf4ff;
      --tag-text: #0550ae;
    }
    [data-theme="dark"] {
      --bg: #0d1117;
      --sidebar-bg: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --hover: #1c2433;
      --active-bg: #1c2d3e;
      --active-text: #58a6ff;
      --tag-bg: #1c2d3e;
      --tag-text: #58a6ff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      height: 48px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      flex-shrink: 0;
    }
    .menu-btn {
      width: 30px; height: 30px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .menu-btn span { display: block; width: 13px; height: 1.5px; background: var(--text); border-radius: 2px; }
    .site-name { font-size: 14px; font-weight: 700; }
    .wip-badge {
      font-size: 10px; font-weight: 600;
      background: var(--tag-bg); color: var(--tag-text);
      padding: 2px 6px; border-radius: 20px;
    }

    .layout { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
      transition: width 0.2s;
    }
    .sidebar.collapsed { width: 0; overflow: hidden; }

    /* SETTINGS */
    .settings-panel { display: none; flex-direction: column; padding: 14px; gap: 14px; }
    .settings-panel.open { display: flex; }
    .s-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .s-user { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#0969da,#58a6ff); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .u-name { font-size: 13px; font-weight: 600; }
    .u-handle { font-size: 11px; color: var(--text-muted); }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-row span { font-size: 13px; }
    .toggle { width: 34px; height: 18px; background: var(--border); border-radius: 20px; position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
    .toggle.on { background: var(--accent); }
    .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: left 0.2s; }
    .toggle.on::after { left: 18px; }
    .s-row { display: flex; flex-direction: column; gap: 3px; }
    .s-row label { font-size: 11px; color: var(--text-muted); }
    .s-row .s-val { font-size: 13px; }
    .divider { height: 1px; background: var(--border); }

    /* NAV */
    #navPanel { display: flex; flex-direction: column; padding: 6px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px;
      cursor: pointer; font-size: 13px; color: var(--text);
      transition: background 0.1s; user-select: none;
    }
    .nav-item:hover { background: var(--hover); }
    .nav-item.active { background: var(--active-bg); color: var(--active-text); font-weight: 500; }

    .cat-header {
      display: flex; align-items: center;
      padding: 8px 14px 4px;
      cursor: pointer;
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      user-select: none;
    }
    .cat-header:hover { color: var(--text); }
    .cat-chev { margin-left: auto; font-size: 9px; transition: transform 0.2s; }
    .cat-header.open .cat-chev { transform: rotate(90deg); }
    .cat-sub { display: none; }
    .cat-sub.open { display: block; }
    .cat-sub .nav-item { padding-left: 28px; font-size: 12px; }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; padding: 20px 24px; }

    .readme-wrap { max-width: 700px; }
    .readme-head { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; }
    .readme-body { font-size: 14px; line-height: 1.8; color: var(--text); }
    .readme-body h1 { font-size: 24px; font-weight: 700; margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .readme-body h2 { font-size: 18px; font-weight: 600; margin: 20px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .readme-body h3 { font-size: 15px; font-weight: 600; margin: 16px 0 6px; }
    .readme-body p { color: var(--text-muted); margin-bottom: 12px; }
    .readme-body a { color: var(--accent); text-decoration: none; }
    .readme-body a:hover { text-decoration: underline; }
    .readme-body code { background: var(--sidebar-bg); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; color: var(--text); }
    .readme-body pre { background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; margin-bottom: 14px; }
    .readme-body pre code { background: none; border: none; padding: 0; font-size: 13px; }
    .readme-body ul, .readme-body ol { padding-left: 22px; margin-bottom: 12px; color: var(--text-muted); }
    .readme-body li { margin-bottom: 4px; }
    .readme-body blockquote { border-left: 3px solid var(--border); padding-left: 14px; color: var(--text-muted); margin: 0 0 12px; font-style: italic; }
    .readme-body img { max-width: 100%; border-radius: 6px; }
    .readme-body table { width: 100%; border-collapse: collapse; margin-bottom: 14px; font-size: 13px; }
    .readme-body th, .readme-body td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
    .readme-body th { background: var(--sidebar-bg); font-weight: 600; }
    .readme-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .readme-body strong { color: var(--text); font-weight: 600; }

    .src-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .src-head h2 { font-size: 17px; font-weight: 600; }
    .src-count { font-size: 11px; color: var(--text-muted); background: var(--sidebar-bg); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; }

    .src-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
    .src-card { border: 1px solid var(--border); border-radius: 8px; background: var(--sidebar-bg); padding: 14px; transition: border-color 0.15s; }
    .src-card:hover { border-color: var(--accent); }
    .card-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; word-break: break-all; }
    .card-size { font-size: 11px; color: var(--text-muted); }
    .card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
    .dl-btn { font-size: 12px; font-weight: 500; color: var(--accent); background: var(--active-bg); border: 1px solid var(--accent); padding: 4px 10px; border-radius: 6px; cursor: pointer; text-decoration: none; }
    .file-tag { font-size: 10px; background: var(--tag-bg); color: var(--tag-text); padding: 2px 6px; border-radius: 20px; }

    .loading { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 13px; padding: 16px 0; }
    .spin { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { color: var(--text-muted); font-size: 13px; padding: 16px 0; }
  </style>
</head>
<body>

<header>
  <div class="menu-btn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
  <span class="site-name">MerStor</span>
  <span class="wip-badge">WIP</span>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">

    <div class="settings-panel" id="settingsPanel">
      <div class="s-title">Settings</div>
      <div class="s-user">
        <div class="avatar">M</div>
        <div>
          <div class="u-name">Myokyuu</div>
          <div class="u-handle">@vyhuynh24092021-debug</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="toggle-row">
        <span>Dark mode</span>
        <div class="toggle" id="themeToggle" onclick="toggleTheme()"></div>
      </div>
      <div class="divider"></div>
      <div class="s-row"><label>Repository</label><div class="s-val">MyokyuuSAVE</div></div>
      <div class="s-row"><label>Visibility</label><div class="s-val">Public</div></div>
      <div class="s-row"><label>Branch</label><div class="s-val">main</div></div>
      <div class="divider"></div>
      <div class="nav-item" onclick="closeSettings(); showReadme()">📄 Back to home</div>
    </div>

    <div id="navPanel">
      <div class="nav-item active" id="nav-home" onclick="showReadme()">📄 README</div>
      <div class="divider"></div>
      <div id="navTree"><div class="loading" style="padding:14px"><div class="spin"></div> Loading...</div></div>
    </div>

  </div>

  <div class="main">
    <div id="view-readme" class="readme-wrap">
      <div class="readme-head">📖 README.md</div>
      <div class="readme-body" id="readmeBody">
        <div class="loading"><div class="spin"></div> Loading README...</div>
      </div>
    </div>
    <div id="view-src" style="display:none">
      <div class="src-head">
        <h2 id="src-title">Files</h2>
        <span class="src-count" id="src-count"></span>
      </div>
      <div class="src-grid" id="src-grid"></div>
    </div>
  </div>
</div>

<script>
const OWNER = 'vyhuynh24092021-debug';
const REPO  = 'MyokyuuSAVE';
const API   = `https://api.github.com/repos/${OWNER}/${REPO}`;

// THEME
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
  document.getElementById('themeToggle').classList.toggle('on', !dark);
  localStorage.setItem('theme', dark ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
  document.getElementById('themeToggle').classList.add('on');
}

// MENU
let menuOpen = false;
function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('settingsPanel').classList.toggle('open', menuOpen);
  document.getElementById('navPanel').style.display = menuOpen ? 'none' : '';
}
function closeSettings() {
  menuOpen = false;
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('navPanel').style.display = '';
}

// README
async function showReadme() {
  closeSettings();
  document.getElementById('view-readme').style.display = '';
  document.getElementById('view-src').style.display = 'none';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-home').classList.add('active');

  try {
    const res = await fetch(`${API}/readme`, { headers: { Accept: 'application/vnd.github.raw' } });
    const text = await res.text();
    const html = marked.parse(text);
    document.getElementById('readmeBody').innerHTML = html;
  } catch {
    document.getElementById('readmeBody').innerHTML = '<p>Could not load README.</p>';
  }
}

// LOAD FILES
async function loadFolder(path, label, navEl) {
  closeSettings();
  document.getElementById('view-readme').style.display = 'none';
  document.getElementById('view-src').style.display = '';
  document.getElementById('src-title').textContent = label;
  document.getElementById('src-grid').innerHTML = '<div class="loading"><div class="spin"></div> Loading...</div>';
  document.getElementById('src-count').textContent = '';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (navEl) navEl.classList.add('active');

  try {
    const res = await fetch(`${API}/contents/${path}`);
    if (!res.ok) throw new Error();
    const items = (await res.json()).filter(f => f.type === 'file');

    document.getElementById('src-count').textContent = items.length + ' file' + (items.length !== 1 ? 's' : '');

    if (!items.length) {
      document.getElementById('src-grid').innerHTML = '<div class="empty">No files here.</div>';
      return;
    }

    const sizeStr = b => b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1) + ' KB' : (b/1048576).toFixed(1) + ' MB';

    document.getElementById('src-grid').innerHTML = items.map(f => {
      const ext = f.name.includes('.') ? f.name.split('.').pop().toLowerCase() : 'file';
      return `
        <div class="src-card">
          <div class="card-name">${f.name}</div>
          <div class="card-size">${sizeStr(f.size)}</div>
          <div class="card-foot">
            <span class="file-tag">.${ext}</span>
            <a class="dl-btn" href="${f.download_url}" download="${f.name}" target="_blank">↓ Download</a>
          </div>
        </div>`;
    }).join('');
  } catch {
    document.getElementById('src-grid').innerHTML = '<div class="empty">Could not load files.</div>';
  }
}

// BUILD SIDEBAR FROM REPO
async function buildNav() {
  const tree = document.getElementById('navTree');
  try {
    const res = await fetch(`${API}/contents`);
    const root = await res.json();

    // Lấy các folder ở root
    const folders = root.filter(f => f.type === 'dir' && f.name !== '.github');

    if (!folders.length) {
      tree.innerHTML = '<div class="empty" style="padding:14px">No folders found.</div>';
      return;
    }

    let html = '';
    for (const folder of folders) {
      const catId = 'cat-' + folder.name;
      const subId = 'sub-' + folder.name;

      // Lấy sub-folders bên trong
      const subRes = await fetch(`${API}/contents/${folder.name}`);
      const subItems = await subRes.json();
      const subFolders = subItems.filter(f => f.type === 'dir');
      const files = subItems.filter(f => f.type === 'file');

      html += `<div class="cat-header" id="${catId}" onclick="toggleCat('${folder.name}')">${folder.name.toUpperCase()} <span class="cat-chev">▶</span></div>`;
      html += `<div class="cat-sub" id="${subId}">`;

      if (subFolders.length > 0) {
        // Có sub-folder → list sub-folder
        subFolders.forEach(sf => {
          html += `<div class="nav-item" onclick="loadFolder('${folder.name}/${sf.name}', '${sf.name}', this)">${sf.name}</div>`;
        });
      } else if (files.length > 0) {
        // Không có sub-folder → load thẳng files
        html += `<div class="nav-item" onclick="loadFolder('${folder.name}', '${folder.name}', this)">${folder.name}</div>`;
      } else {
        html += `<div class="nav-item" style="color:var(--text-muted);cursor:default">Empty</div>`;
      }

      html += `</div>`;
      html += `<div class="divider"></div>`;
    }

    tree.innerHTML = html;
  } catch {
    tree.innerHTML = '<div class="empty" style="padding:14px">Could not load repo.</div>';
  }
}

function toggleCat(name) {
  document.getElementById('cat-' + name).classList.toggle('open');
  document.getElementById('sub-' + name).classList.toggle('open');
}

// INIT
showReadme();
buildNav();
</script>
</body>
  </html>
